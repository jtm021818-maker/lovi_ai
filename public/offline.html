<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>루나 연애상담 - 오프라인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B0A1D;
      background-image: radial-gradient(ellipse at top, rgba(147,51,234,0.3), #0B0A1D 70%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      text-align: center;
      padding: 24px;
    }
    .container {
      max-width: 320px;
    }
    .emoji {
      font-size: 64px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #f472b6, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    button {
      padding: 14px 32px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #9333ea, #ec4899);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    button:active {
      transform: scale(0.95);
    }
    button:hover {
      box-shadow: 0 0 24px rgba(147,51,234,0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🌙</div>
    <h1>인터넷 연결이 필요해요</h1>
    <p>루나가 기다리고 있어요!<br>네트워크 연결을 확인하고 다시 시도해 주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
